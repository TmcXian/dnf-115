<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作日志 - DNF装备工具</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/dnf-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #c0c0c0;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #8b7355;
        }
        .page-header h1 {
            color: #ffd700;
            font-size: 24px;
        }
        .back-link {
            color: #ffd700;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-bar select, .filter-bar button {
            background: #222;
            border: 1px solid #8b7355;
            color: #c0c0c0;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-bar button {
            background: #8b7355;
            color: #fff;
            font-weight: bold;
        }
        .filter-bar button:hover { background: #a08866; }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }
        .log-table th {
            background: #333;
            color: #ffd700;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #8b7355;
        }
        .log-table td {
            padding: 10px 15px;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        .log-table tr:hover { background: #2a2a2a; }
        .action-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .action-login { background: #2d5016; color: #7ec850; }
        .action-register { background: #1a3a5c; color: #5caeff; }
        .action-login_failed { background: #5c1a1a; color: #ff6b6b; }
        .action-login_blocked { background: #5c3a1a; color: #ffa500; }
        .action-other { background: #333; color: #999; }
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }
        .pagination button {
            background: #222;
            border: 1px solid #8b7355;
            color: #c0c0c0;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .pagination button:hover { background: #333; }
        .pagination button.active { background: #8b7355; color: #fff; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .no-data {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 18px;
        }
        .error-msg {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #ffd700;
        }
        .summary {
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📋 操作日志</h1>
            <a href="../index.html" class="back-link">← 返回首页</a>
        </div>

        <div class="filter-bar">
            <label style="color:#c0c0c0;font-size:14px;">筛选操作：</label>
            <select id="actionFilter">
                <option value="">全部</option>
                <option value="login">登录成功</option>
                <option value="login_failed">登录失败</option>
                <option value="login_blocked">登录拦截</option>
                <option value="register">注册</option>
            </select>
            <button onclick="loadLogs(1)">查询</button>
            <span class="summary" id="summary"></span>
        </div>

        <div id="tableContainer">
            <div class="loading">加载中...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let currentPage = 1;
        let currentAction = '';

        function getToken() {
            return localStorage.getItem('dnf_token');
        }

        async function loadLogs(page) {
            currentPage = page;
            currentAction = document.getElementById('actionFilter').value;
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">加载中...</div>';

            const token = getToken();
            if (!token) {
                container.innerHTML = '<div class="error-msg">⚠️ 请先登录后再查看操作日志</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const params = new URLSearchParams({ page, limit: 20 });
            if (currentAction) params.append('action', currentAction);

            try {
                const res = await fetch(`/api/logs?${params}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!data.success) {
                    container.innerHTML = `<div class="error-msg">⚠️ ${data.message}</div>`;
                    return;
                }

                const { list, total, page: curPage, totalPages } = data.data;

                document.getElementById('summary').textContent =
                    `共 ${total} 条记录，第 ${curPage}/${totalPages} 页`;

                if (list.length === 0) {
                    container.innerHTML = '<div class="no-data">暂无操作日志</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                renderTable(list);
                renderPagination(curPage, totalPages);
            } catch (err) {
                container.innerHTML = '<div class="error-msg">⚠️ 网络错误，请稍后重试</div>';
                console.error(err);
            }
        }

        function renderTable(list) {
            const actionLabels = {
                'login': '登录成功',
                'login_failed': '登录失败',
                'login_blocked': '登录拦截',
                'register': '注册'
            };

            let html = '<table class="log-table"><thead><tr>';
            html += '<th>ID</th><th>用户</th><th>操作</th><th>详情</th><th>IP</th><th>时间</th>';
            html += '</tr></thead><tbody>';

            list.forEach(log => {
                const actionClass = log.action.startsWith('login_') ?
                    `action-${log.action}` :
                    (['login', 'register'].includes(log.action) ? `action-${log.action}` : 'action-other');
                const actionLabel = actionLabels[log.action] || log.action;

                html += '<tr>';
                html += `<td>${log.id}</td>`;
                html += `<td>${escapeHtml(log.username)}</td>`;
                html += `<td><span class="action-tag ${actionClass}">${actionLabel}</span></td>`;
                html += `<td>${escapeHtml(log.detail || '')}</td>`;
                html += `<td style="font-family:monospace;font-size:12px;">${escapeHtml(log.ip || '')}</td>`;
                html += `<td>${formatTime(log.created_at)}</td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        function renderPagination(page, totalPages) {
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }

            let html = '';
            html += `<button onclick="loadLogs(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹ 上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button onclick="loadLogs(${i})" class="${i === page ? 'active' : ''}">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += '<button disabled>...</button>';
                }
            }

            html += `<button onclick="loadLogs(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页 ›</button>`;
            pag.innerHTML = html;
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        function escapeHtml(str) {
            if (!str || typeof str !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 初始化
        loadLogs(1);
    </script>
</body>
</html>
